      align-items: center;
      padding: 20px;
      font-family: Helvetica, Arial, sans-serif;
    }
    h1 {
      color: #ccc;
      margin-bottom: 20px;
      font-size: 24px;
      letter-spacing: 1px;
    }
    #map-container {
      position: relative;
    }
    #cluster-svg {
      width: 800px;
      height: 800px;
      border-radius: 10px;
      display: block;
    }
    #tooltip {
      position: fixed;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 14px;
      display: none;
      z-index: 1000;
      text-align: center;
      min-width: 130px;
      pointer-events: none;
      box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    }
    #tooltip img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: block;
      margin: 0 auto 8px;
      object-fit: cover;
      border: 2px solid #00babc;
      background: #333;
    }
    #tooltip img.hidden { display: none; }
    #tooltip .t-login {
      color: #fff;
      font-size: 13px;
      font-weight: bold;
    }
    #controls {
      margin-top: 16px;
      width: 800px;
    }
    #controls label {
      color: #aaa;
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
    }
    #controls textarea {
      width: 100%;
      height: 110px;
      background: #1e1e1e;
      color: #ccc;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
      font-family: monospace;
      resize: vertical;
      outline: none;
    }
    #controls textarea:focus { border-color: #00babc; }
    .btn-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
    .btn {
      padding: 7px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }
    .btn-apply { background: #00babc; color: #fff; }
    .btn-apply:hover { background: #009fa1; }
    .btn-clear { background: #444; color: #ccc; }
    .btn-clear:hover { background: #555; }
    #status { font-size: 12px; margin-left: 4px; }
    .status-ok { color: #4caf50; }
    .status-err { color: #f44336; }
    #legend {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; color: #888; font-size: 12px; }
    .legend-box {
      width: 14px; height: 14px; border-radius: 3px;
      border: 1px solid #555;
    }

    <label>
      JSON 데이터 붙여넣기
      <span style="color:#666;font-size:11px;margin-left:8px;">형식: {"c1r1s1": {"login": "jdoe", "image": "https://..."}, ...}</span>
    </label>
    <textarea id="json-input" placeholder='{
  "c1r5s3": { "login": "hskim", "image": "https://cdn.intra.42.fr/users/..." },
  "c1r7s1": { "login": "peer42", "image": "" }
}'></textarea>
    <div class="btn-row">
      <button class="btn btn-apply" onclick="applyJSON()">적용</button>
      <button class="btn btn-clear" onclick="clearSeats()">초기화</button>
      <span id="status"></span>
    </div>

    <div id="legend">
      <div class="legend-item">
        <div class="legend-box" style="background:#e5e5e5;"></div>
        빈 자리
      </div>
      <div class="legend-item">
        <div class="legend-box" style="background:#00babc;border-color:#009fa1;"></div>
        사용 중
      </div>
    </div>
  </div>

  <script>
    const OCCUPIED_COLOR = '#00babc';
    const EMPTY_COLOR = '#e5e5e5';

    function loadSeats(json) {
      clearSeats(false);
      let count = 0;
      for (const [seatId, user] of Object.entries(json)) {
        const rect = document.getElementById(seatId);
        if (!rect) continue;
        rect.setAttribute('fill', OCCUPIED_COLOR);
        rect.dataset.login = user.login || '';
        rect.dataset.image = user.image || '';
        count++;
      }
      return count;
    }

    function clearSeats(resetStatus = true) {
      document.querySelectorAll('rect[id^="c1r"]').forEach(rect => {
        rect.setAttribute('fill', EMPTY_COLOR);
        delete rect.dataset.login;
        delete rect.dataset.image;
      });
      if (resetStatus) setStatus('', '');
    }

    function applyJSON() {
      const raw = document.getElementById('json-input').value.trim();
      if (!raw) { setStatus('JSON을 입력하세요.', 'err'); return; }
      try {
        const data = JSON.parse(raw);
        const count = loadSeats(data);
        setStatus(`${count}개 자리 적용됨.`, 'ok');
      } catch (e) {
        setStatus('JSON 파싱 오류: ' + e.message, 'err');
      }
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type === 'ok' ? 'status-ok' : type === 'err' ? 'status-err' : '';
    }

    // Tooltip
    const tooltip = document.getElementById('tooltip');
    const tooltipImg = document.getElementById('tooltip-img');
    const tooltipLogin = document.getElementById('tooltip-login');

    document.addEventListener('mousemove', e => {
      if (tooltip.style.display !== 'block') return;
      let x = e.clientX + 16;
      let y = e.clientY - 90;
      if (x + 160 > window.innerWidth) x = e.clientX - 160;
      if (y < 8) y = e.clientY + 16;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    });

    document.querySelectorAll('rect[id^="c1r"]').forEach(rect => {
      rect.addEventListener('mouseenter', () => {
        const login = rect.dataset.login;
        if (!login) return;
        const img = rect.dataset.image;
        tooltipImg.src = img || '';
        tooltipImg.style.display = img ? 'block' : 'none';
        tooltipLogin.textContent = login;
        tooltip.style.display = 'block';
      });
      rect.addEventListener('mouseleave', () => {
        tooltip.style.display = 'none';
      });
    });
  </script>
